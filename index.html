<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYO Header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="#" class="header__logo-link">
            <img src="https://raw.githubusercontent.com/Mate-academy/layout_moyo-header/main/src/images/moyo-logo.svg" alt="MOYO Logo" class="header__logo">
        </a>
        <nav class="header__nav">
            <ul class="header__nav-list">
                <li class="header__nav-item">
                    <a href="#" class="header__nav-link is-active">Gadgets</a>
                </li>
                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">For home</a>
                </li>
                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">Gaming</a>
                </li>
                <li class="header__nav-item">
                    <a href="#" class="header__nav-link" data-qa="hover">Laptops & computers</a>
                </li>
                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">PC parts</a>
                </li>
                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">Photo & video</a>
                </li>
                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">TV</a>
                </li>
                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">Accessories</a>
                </li>
            </ul>
        </nav>
    </header>
</body>
</html>
